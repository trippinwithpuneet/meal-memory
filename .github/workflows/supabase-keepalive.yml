name: Supabase keep-alive

# Free-tier Supabase projects auto-pause after 7 days with no API activity.
# This pings the REST endpoint daily so the project stays warm.
#
# Notes:
#  - Scheduled workflows only run from the default branch, so this activates
#    once merged to main.
#  - The anon key below is public by design (it already ships in the app and is
#    committed in MealMemory/Info.plist) — safe to keep here.
#  - This prevents FUTURE pauses; it cannot un-pause an already-paused project.
#    Restore a paused project once from the Supabase dashboard.

on:
  schedule:
    - cron: '17 9 * * *'   # daily at 09:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (counts as project activity)
        env:
          SUPABASE_URL: https://dkxbtavoeqvixepwqutg.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRreGJ0YXZvZXF2aXhlcHdxdXRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODQxMjEsImV4cCI6MjA5ODA2MDEyMX0.R5EUfk5pvDpQJZwSsDQZWo6og9-ydIqQwtvoYCnNasQ
        run: |
          set -euo pipefail
          code=$(curl -s -m 25 -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/households?select=id&limit=1")
          echo "Supabase responded HTTP $code"
          if [ "$code" = "000" ]; then
            echo "::warning::No response — the project may be paused. Restore it in the Supabase dashboard."
            exit 1
          fi
          echo "Project is awake (any HTTP response counts as activity)."
