name: CI

# Builds the app for the iOS Simulator on every PR and on pushes to main.
# Simulator builds need no code signing, so no secrets are required.
# The project is XcodeGen-generated: `xcodegen generate` blanks the Supabase
# values in Info.plist, which is fine for a compile check (they're runtime-only).

on:
  pull_request: {}
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project MealMemory.xcodeproj \
            -scheme MealMemory \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
